# PhysMC 配置
# 所有参数都可以用 /physmc get <键名> 查看说明和当前值。
# 修改示例: /physmc set 物理.重力_Y -15

物理:
  # X 轴重力加速度。
  # 建议: 通常保持 0；需要横向风场效果时再调整。
  重力_X: 0.0

  # Y 轴重力加速度。
  # 建议: 默认 -10 接近 Minecraft 观感；更重可用 -15 到 -25。
  重力_Y: -10.0

  # Z 轴重力加速度。
  # 建议: 通常保持 0；需要固定方向外力时再调整。
  重力_Z: 0.0

  # Bullet 固定子步长，单位秒。
  # 建议: 0.016666668；更小更稳定但更耗性能。
  固定步长: 0.016666668

  # 每 tick 最多执行的 Bullet 子步数。
  # 建议: 3-5；高速物体穿模时调高，卡顿时调低。
  最大子步数: 5

  # 动态物体周围扫描静态地形的额外半径，单位方块。
  # 建议: 1-2；高速或大物体可调到 3。
  地形扫描边距: 2

  # 每隔多少 tick 刷新附近地形碰撞体。
  # 建议: 3-10；实体多时调大，快速移动时调小。
  地形同步间隔: 5

  # 是否为休眠刚体继续扫描地形。
  # 建议: false；如果地形会在静止物体附近频繁改变再设 true。
  扫描休眠刚体: false

  # 动态盒碰撞体的 Bullet margin。
  # 建议: 0-0.02；视觉贴合优先用 0，稳定性优先用 0.01。
  动态碰撞边距: 0.0

  # 静态地形碰撞体的 Bullet margin。
  # 建议: 0-0.02；浮空明显时保持 0。
  静态碰撞边距: 0.0

  # 接触摩擦系数。
  # 建议: 0.5-1.0；太低会很滑，太高堆叠更稳但可能更耗解算。
  摩擦系数: 0.9

  # 静摩擦系数，用于 Bullet 接触求解。
  # 建议: 0.6-1.2；冰面调低，蜂蜜块调高。
  静摩擦系数: 0.9

  # 动摩擦系数，用于接触地形时的水平速度衰减近似。
  # 建议: 0.01-0.2；越大滑行越短。
  动摩擦系数: 0.05

  # 滚动摩擦系数，用于接触地形时的角速度衰减近似。
  # 建议: 0.01-0.2；越大越快停止滚动。
  滚动摩擦系数: 0.04

  # 动态物体反弹系数。
  # 建议: 0-0.3；飞弹明显时降低到 0-0.05。
  反弹系数: 0.15

  # 静态地形反弹系数。
  # 建议: 0-0.2；落地弹跳过强时降低。
  静态反弹系数: 0.1

  # 线速度阻尼。
  # 建议: 0-0.05；想让物体更快停下可调高。
  线性阻尼: 0.01

  # 角速度阻尼。
  # 建议: 0.03-0.15；旋转太久不停时调高。
  角阻尼: 0.05

  # 线速度低于该阈值时更容易休眠。
  # 建议: 0.01-0.05；实体多时调高可省性能。
  线性休眠阈值: 0.02

  # 角速度低于该阈值时更容易休眠。
  # 建议: 0.01-0.05；实体多时调高可省性能。
  角休眠阈值: 0.02

性能:
  # 是否启用空间分区和激活范围。
  # 建议: true；刚体数量很多时必须开启。
  启用分区: true

  # 玩家周围完整物理模拟半径，单位方块。
  # 建议: 32-64；核心互动区域保持完整模拟。
  完整模拟半径: 48.0

  # 玩家周围降频物理模拟半径，单位方块。
  # 建议: 64-128；该范围内按间隔模拟。
  降频模拟半径: 96.0

  # 玩家周围保持可唤醒的最大半径，单位方块。
  # 建议: 128-192；超过该范围强制休眠。
  休眠半径: 160.0

  # 降频区域每隔多少 tick 模拟一次。
  # 建议: 2-5；越大越省性能但远处越不连续。
  降频模拟间隔: 3

  # 空间分区单元大小，单位方块。
  # 建议: 16-32；通常与区块大小接近。
  分区单元大小: 16.0

  # 是否暂停未加载区块内刚体模拟。
  # 建议: true；避免物理把实体同步到未加载区块。
  暂停未加载区块: true

  # 选区构建任务每 tick 最多处理的方块数。
  # 建议: 100-300；越大构建越快但越容易卡顿。
  选区构建每刻方块数: 200

  # 选区构建时是否剔除完全藏在内部的方块。
  # 建议: true；可显著减少 Display、刚体和约束数量。
  选区构建剔除内部方块: true

显示:
  # Display Entity 插值延迟 tick。
  # 建议: 0；网络抖动明显可试 1。
  插值延迟: 0

  # Display Entity 变换插值时长 tick。
  # 建议: 2-3；越大越顺滑但视觉延迟越高。
  插值时长: 2

  # Display Entity 位置传送插值时长 tick。
  # 建议: 与插值时长一致。
  传送时长: 2

  # 新建球体默认显示精细度。0 表示只用一个外包正方体显示，数值越大 Display 方块越多。
  # 建议: 0-4；每个球也可以在 spawn 命令里单独指定。
  球体精细度: 3

材质:
  # 冰的地形摩擦系数。
  # 建议: 0.01-0.08；越低滑行越远。
  摩擦系数_ICE: 0.03

  # 浮冰的地形摩擦系数。
  # 建议: 0.01-0.05。
  摩擦系数_PACKED_ICE: 0.02

  # 蓝冰的地形摩擦系数。
  # 建议: 0.005-0.03。
  摩擦系数_BLUE_ICE: 0.01

  # 冰的静摩擦、动摩擦、滚动摩擦。
  # 建议: 三项都保持很低，滑行距离会明显更远。
  静摩擦系数_ICE: 0.04
  动摩擦系数_ICE: 0.006
  滚动摩擦系数_ICE: 0.008

  # 浮冰的静摩擦、动摩擦、滚动摩擦。
  # 建议: 比普通冰更低。
  静摩擦系数_PACKED_ICE: 0.025
  动摩擦系数_PACKED_ICE: 0.004
  滚动摩擦系数_PACKED_ICE: 0.006

  # 蓝冰的静摩擦、动摩擦、滚动摩擦。
  # 建议: 所有冰类里最低。
  静摩擦系数_BLUE_ICE: 0.015
  动摩擦系数_BLUE_ICE: 0.002
  滚动摩擦系数_BLUE_ICE: 0.004

  # 蜂蜜块的地形摩擦系数。
  # 建议: 1.0-2.0；越高越黏。
  摩擦系数_HONEY_BLOCK: 1.5

  # 蜂蜜块的材质行为。
  # 建议: 高摩擦、低反弹，表现为黏滞。
  静摩擦系数_HONEY_BLOCK: 1.8
  动摩擦系数_HONEY_BLOCK: 0.35
  滚动摩擦系数_HONEY_BLOCK: 0.45
  反弹系数_HONEY_BLOCK: 0.02

  # 灵魂沙的材质行为。
  # 建议: 偏高摩擦，让物体明显减速。
  静摩擦系数_SOUL_SAND: 1.25
  动摩擦系数_SOUL_SAND: 0.18
  滚动摩擦系数_SOUL_SAND: 0.22
  反弹系数_SOUL_SAND: 0.02

  # 灵魂土的材质行为。
  # 建议: 与灵魂沙接近。
  静摩擦系数_SOUL_SOIL: 1.25
  动摩擦系数_SOUL_SOIL: 0.18
  滚动摩擦系数_SOUL_SOIL: 0.22
  反弹系数_SOUL_SOIL: 0.02

  # 黏液块的地形反弹系数。
  # 建议: 0.6-0.95。
  反弹系数_SLIME_BLOCK: 0.8

  # 黏液块的材质行为。
  # 建议: 低动摩擦、低滚动摩擦、高反弹，保留弹跳感。
  静摩擦系数_SLIME_BLOCK: 0.65
  动摩擦系数_SLIME_BLOCK: 0.035
  滚动摩擦系数_SLIME_BLOCK: 0.02

流体:
  # 是否启用水和岩浆浮力。
  # 建议: true；如果实体很多且液体区域复杂，可设 false 关闭。
  启用浮力: true

  # 流体采样模式。7 表示中心和六个面，27 表示更精细的三轴网格。
  # 建议: 7；只有小物体在复杂水面表现不够好时再设 27。
  采样点数: 7

  # 水的流体密度。当前以 Minecraft 视觉调校为主，不是 SI 单位。
  # 建议: 800-1200；物体太容易沉就调高。
  密度_水: 1000.0

  # 岩浆的流体密度。通常应高于水。
  # 建议: 2000-3500。
  密度_岩浆: 3000.0

  # 水的线性阻力系数。
  # 建议: 0.5-3.0；水里滑太快就调高。
  线性阻力_水: 1.5

  # 岩浆的线性阻力系数。
  # 建议: 3.0-8.0；岩浆应明显更粘。
  线性阻力_岩浆: 5.0

  # 水的角阻力系数。
  # 建议: 0.2-2.0；水里旋转太久就调高。
  角阻力_水: 0.8

  # 岩浆的角阻力系数。
  # 建议: 2.0-6.0。
  角阻力_岩浆: 3.0

  # 水平水流速度倍率。
  # 建议: 0.4-1.5；想让水流推力更强就调高。
  水平流速_水: 0.9

  # 水平岩浆流速倍率。
  # 建议: 0.2-0.8；岩浆通常比水慢。
  水平流速_岩浆: 0.45

  # 下落水流向下速度。
  # 建议: 0.5-2.0。
  下落流速_水: 1.2

  # 下落岩浆向下速度。
  # 建议: 0.2-1.0。
  下落流速_岩浆: 0.5

  # 上升气泡柱向上速度。
  # 建议: 1.0-4.0。
  气泡柱上升速度: 2.5

  # 下降气泡柱向下速度。
  # 建议: 1.0-4.0。
  气泡柱下降速度: 2.5

实体:
  # 是否启用刚体与游戏实体碰撞，包括玩家。
  # 建议: true；实体很多时可设 false。
  启用碰撞: true

  # 动态物体周围扫描游戏实体的半径，单位方块。
  # 建议: 3-8；实体多时调小。
  扫描半径: 6.0

  # 每隔多少 tick 刷新附近游戏实体碰撞体。
  # 建议: 2-5；实体很多时调大，快速运动实体多时调小。
  扫描间隔: 3

  # 没有单独质量配置时，玩家默认质量。
  # 建议: 默认 0；玩家只作为静态碰撞体，不被物理反作用力推动。需要被推动时设为 60-100。
  默认质量_玩家: 0.0

  # 没有单独质量配置时，非玩家实体默认质量。
  # 建议: 10-80；设为 0 时实体只作为静态碰撞体。具体类型可用 实体.默认质量_类型_<EntityType> 覆盖。
  默认质量_非玩家: 30.0

  # 动态实体从物理世界同步回 Minecraft 时的位置插值系数。
  # 建议: 0.4-1.0；越大越紧跟物理，但实体移动更突然。
  位置同步系数: 0.7

  # 动态实体从物理世界同步回 Minecraft 时的速度同步系数。
  # 建议: 0.5-1.0。
  速度同步系数: 0.8

游戏作用:
  # 玩家左键击打刚体时施加的冲量。
  # 建议: 30-120；物体质量越大需要越高，太大容易击飞。
  攻击冲量: 60.0
